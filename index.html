<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/CSS/shared.css">
    <link rel="stylesheet" href="public/CSS/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <title>Aritra</title>

<body>
    <main>
        <div class="bento">

            <a href="#" class="tile tile-profile">
                <div class="pfp">
                    <img src="assets/Luffy.jpg" alt="pfp">
                </div>
                <div class="profile-text">
                    <div class="p-top">
                        <span class="p-name">Aritra</span>
                        <span class="p-pronoun">he / him</span>
                    </div>
                    <span class="p-role">Backend Engineer</span>
                </div>
            </a>

            <a href="https://github.com/NexusWasLost" target="_blank" class="tile tile-github">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon"><i class="fa-brands fa-github"></i></div>
                    <span class="link-name">GitHub</span>
                </div>
            </a>

            <a href="https://discord.gg/jJX4NXUkfz" target="_blank" class="tile tile-discord">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon"><i class="fa-brands fa-discord"></i></div>
                    <span class="link-name">Discord</span>
                </div>
            </a>

            <a href="https://www.linkedin.com/in/aritra200/" target="_blank" class="tile tile-linkedin">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon"><i class="fa-brands fa-linkedin-in"></i></div>
                    <span class="link-name">LinkedIn</span>
                </div>
            </a>

            <a href="https://nexus.bearblog.dev/" target="_blank" class="tile tile-archive">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon"><i class="ri-archive-line"></i></div>
                    <span class="link-name">Archive</span>
                </div>
            </a>

            <div class="tile tile-connect">
                <div class="link-tile-inner connect-layout">
                    <div class="connect-content">
                        <div class="tile-icon"><i class="ri-send-plane-fill"></i></div>
                        <span class="link-name">Let's connect</span>
                    </div>
                    <a class="connect-badge" href="/contact.html" style="text-decoration: none;">
                        Connect <i class="ri-arrow-right-line"></i>
                    </a>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <span class="footer-text">8bitnexus.pages.dev</span>
        <span class="footer-dot"></span>
        <span class="footer-text">made with <i class="ri-heart-fill footer-heart"></i></span>
    </footer>
