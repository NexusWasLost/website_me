<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <title>Cool | Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="bento-grid">
        <div class="box profile reveal">
            <img src="assets/Luffy.jpg" alt="pfp" class="pfp">
            <div class="info">
                <h1>Cool <span class="badge">he/him</span></h1>
                <p>Junior Backend Engineer</p>
            </div>
        </div>

        <a href="https://github.com/cool" target="_blank" class="box link github reveal">
            <i class="ri-arrow-right-up-line arrow"></i>
            <div class="link-content">
                <i class="fa-brands fa-github brand-icon"></i>
                <span>Github</span>
            </div>
        </a>

        <a href="https://www.linkedin.com/in/username/" target="_blank" class="box link linkedin reveal">
            <i class="ri-arrow-right-up-line arrow"></i>
            <div class="link-content">
                <i class="fa-brands fa-linkedin-in brand-icon"></i>
                <span>LinkedIn</span>
            </div>
        </a>

        <a href="https://discord.gg/ddd" target="_blank" class="box link discord reveal">
            <i class="ri-arrow-right-up-line arrow"></i>
            <div class="link-content">
                <i class="fa-brands fa-discord brand-icon"></i>
                <span>Discord</span>
            </div>
        </a>

        <a href="https://xww.bearblog.dev/" target="_blank" class="box link archive reveal">
            <i class="ri-arrow-right-up-line arrow"></i>
            <div class="link-content">
                <i class="fa-solid fa-box-archive brand-icon"></i>
                <span>Archive</span>
            </div>
        </a>

        <div class="box status reveal">
            <div class="status-inner">
                <div class="dot"></div>
                <span>Available for new roles</span>
            </div>
        </div>
    </main>

</body>
</html>
