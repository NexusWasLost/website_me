<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Cool</title>
</head>

<body>
    <main>
        <div class="bento">

            <a href="#" class="tile tile-profile">
                <div class="avatar">
                    <img src="assets/Luffy.jpg" alt="pfp">
                </div>
                <div class="profile-text">
                    <span class="p-name">Cool</span>
                    <span class="p-pronoun">he / him</span>
                </div>
            </a>

            <div class="tile tile-status">
                <span class="status-label">status</span>
                <div class="status-dot-wrap">
                    <div class="sdot"></div>
                    <span class="status-val">online</span>
                </div>
            </div>

            <a href="https://github.com/username" target="_blank" rel="noopener noreferrer" class="tile tile-github">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <span class="link-name">GitHub</span>
                </div>
            </a>

            <a href="https://discord.gg/dkasljdla" target="_blank" rel="noopener noreferrer" class="tile tile-discord">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon">
                        <i class="fa-brands fa-discord"></i>
                    </div>
                    <span class="link-name">Discord</span>
                </div>
            </a>

            <a href="dev" target="_blank" rel="noopener noreferrer" class="tile tile-archive">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="link-tile-inner">
                    <div class="tile-icon">
                        <i class="ri-archive-line"></i>
                    </div>
                    <span class="link-name">Archive</span>
                </div>
            </a>

            <a href="https://www.linkedin.com/in/username/" target="_blank" rel="noopener noreferrer"
                class="tile tile-linkedin">
                <i class="ri-arrow-right-up-line link-arrow"></i>
                <div class="li-left">
                    <div class="li-icon">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </div>
                    <div class="li-text">
                        <span class="li-name">LinkedIn</span>
                        <span class="li-sub">linkedin.com/in/username</span>
                    </div>
                </div>
                <span class="li-badge">connect →</span>
            </a>

        </div>
    </main>
</body>

</html>
